<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>OsdagBridge IFC Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #10131a;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
        }

        /* ── INFO PANEL (right side) ── */
        #info-panel {
            position: fixed;
            right: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: rgba(15, 18, 28, 0.95);
            border-left: 1px solid #2a3040;
            overflow-y: auto;
            z-index: 10;
            padding: 0;
        }

        #panel-header {
            background: #90af13;
            color: #000;
            padding: 14px 16px;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .section {
            padding: 14px 16px;
            border-bottom: 1px solid #1e2535;
        }

        .section-title {
            color: #90af13;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 7px;
            gap: 8px;
        }

        .info-label {
            color: #6b7a99;
            font-size: 11px;
            flex-shrink: 0;
        }

        .info-value {
            color: #e0e8f0;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            text-align: right;
            word-break: break-all;
        }

        /* Color legend dots */
        .legend-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .legend-label {
            color: #aab8cc;
            font-size: 11px;
        }

        /* Loading / status bar */
        #status-bar {
            position: fixed;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            color: #e0e8f0;
            font-family: monospace;
            font-size: 13px;
            background: rgba(10, 13, 22, 0.85);
            border: 1px solid #2a3040;
            padding: 8px 20px;
            border-radius: 20px;
            z-index: 20;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        /* Hover tooltip */
        #tooltip {
            position: fixed;
            background: rgba(10, 13, 22, 0.92);
            border: 1px solid #2a3040;
            color: #e0e8f0;
            font-size: 11px;
            font-family: monospace;
            padding: 6px 10px;
            border-radius: 6px;
            pointer-events: none;
            display: none;
            z-index: 30;
            line-height: 1.6;
        }
    </style>

    <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js"
    }
  }
  </script>
</head>

<body>

    <div id="status-bar">Initialising web-ifc engine...</div>
    <div id="tooltip"></div>
    <div id="info-panel">
        <div id="panel-header">Bridge Information</div>
        <div id="panel-body">
            <div class="section">
                <div class="section-title">Loading...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls }
            from "https://unpkg.com/three@0.170.0/examples/jsm/controls/OrbitControls.js";
        import * as WebIFC
            from "https://unpkg.com/web-ifc@0.0.77/web-ifc-api.js";


        // ════════════════════════════════════════════════════
        //  COLOUR SCHEME
        //
        //  The bridge file has two element types:
        //    IFCBEAM (625)                 → main steel girders
        //    IFCBUILDINGELEMENTPROXY (66)  → cross bracings (Brace#)
        //
        //  Mentor's instruction:
        //    cross parts (braces) → light colour
        //    upper / main parts   → steel + concrete colour
        // ════════════════════════════════════════════════════

        const COLOR = {
            // Main steel I-girders — blue-grey steel tone
            BEAM: 0x607D8B,

            // Cross bracing members — light silver (mentor: "light colour")
            BRACE: 0xCFD8DC,

            // Deck / concrete top zone — warm concrete beige
            // (applied to beams whose Y centre is above a threshold)
            CONCRETE: 0xD4C5A9,

            // Default fallback
            DEFAULT: 0x808080,
        };

        // ── SCENE ────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x10131a);

        // Subtle fog so far geometry fades naturally
        scene.fog = new THREE.FogExp2(0x10131a, 0.003);

        // ── CAMERA ───────────────────────────────────────────
        const camera = new THREE.PerspectiveCamera(
            55,
            (window.innerWidth - 280) / window.innerHeight,
            0.1,
            10000
        );
        camera.position.set(100, 80, 100);

        // ── RENDERER ─────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        // Width = window minus right panel (280px)
        renderer.setSize(window.innerWidth - 280, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // ── ORBIT CONTROLS ───────────────────────────────────
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.screenSpacePanning = true;

        // ── LIGHTS ───────────────────────────────────────────
        // Soft overall fill so shadows don't go pitch-black
        scene.add(new THREE.AmbientLight(0xffffff, 2.0));

        // Main sun from upper-right
        const sun = new THREE.DirectionalLight(0xffffff, 3.5);
        sun.position.set(150, 200, 150);
        sun.castShadow = true;
        scene.add(sun);

        // Softer fill from opposite side
        const fill = new THREE.DirectionalLight(0xddeeff, 1.5);
        fill.position.set(-100, 80, -100);
        scene.add(fill);

        // Ground reflection bounce light
        const bounce = new THREE.DirectionalLight(0xfff5e0, 0.8);
        bounce.position.set(0, -50, 0);
        scene.add(bounce);

        // ── GRID ─────────────────────────────────────────────
        scene.add(new THREE.GridHelper(1000, 100, 0x1e2535, 0x1e2535));

        // ════════════════════════════════════════════════════
        //  IFC LOADING
        // ════════════════════════════════════════════════════

        const ifc = new WebIFC.IfcAPI();
        const group = new THREE.Group();

        // Statistics we fill while loading (shown in right panel)
        const stats = {
            projectName: '—',
            totalBeams: 0,
            totalBraces: 0,
            spanLength: '—',
            bridgeWidth: '—',
            bridgeHeight: '—',
            minCoord: '—',
            maxCoord: '—',
            material: '—',
        };

        function setStatus(msg) {
            document.getElementById('status-bar').textContent = msg;
        }

        async function loadIFC() {
            setStatus('Initialising WASM engine…');

            // Point web-ifc to its WebAssembly file (loaded from CDN)
            ifc.SetWasmPath("https://unpkg.com/web-ifc@0.0.77/");
            await ifc.Init();

            setStatus('Fetching IFC file…');

            // Fetch the IFC file as binary data
            const response = await fetch("./D_40_3L_NF_S_SUPER.ifc");
            const data = new Uint8Array(await response.arrayBuffer());

            setStatus('Parsing IFC geometry…');

            // Open the model in web-ifc — returns a numeric model ID
            const modelID = ifc.OpenModel(data);

            // ── Extract project metadata ──────────────────────
            try {
                // IFCPROJECT holds the project name
                const projIDs = ifc.GetAllItemsOfType(
                    modelID, WebIFC.IFCPROJECT, false
                );
                if (projIDs.length) {
                    const proj = ifc.GetLine(modelID, projIDs[0]);
                    stats.projectName = proj.Name?.value || 'D_40_3L_NF_S_SUPER';
                }
            } catch (_) { }

            // Count beams and braces
            try {
                stats.totalBeams =
                    ifc.GetAllItemsOfType(modelID, WebIFC.IFCBEAM, false).length;
                stats.totalBraces =
                    ifc.GetAllItemsOfType(
                        modelID, WebIFC.IFCBUILDINGELEMENTPROXY, false
                    ).length;
            } catch (_) { }

            // ── Build geometry ────────────────────────────────
            // LoadAllGeometry returns every placed shape in the model
            const allGeometry = ifc.LoadAllGeometry(modelID);

            for (let i = 0; i < allGeometry.size(); i++) {
                const placed = allGeometry.get(i);  // one IFC element

                // ── Determine element type and name ─────────────
                let elemType = 0;
                let elemName = '';
                try {
                    const line = ifc.GetLine(modelID, placed.expressID);
                    elemType = line.type;
                    elemName = line.Name?.value || '';
                } catch (_) { }

                // ── Choose colour based on type / name ──────────
                // IFCBUILDINGELEMENTPROXY elements are the Brace# cross members
                // → mentor said these should be "light colour"
                let meshColor;
                if (
                    elemType === WebIFC.IFCBUILDINGELEMENTPROXY ||
                    elemName.toLowerCase().includes('brace')
                ) {
                    meshColor = COLOR.BRACE;    // light silver
                } else {
                    meshColor = COLOR.BEAM;     // steel blue-grey (default for beams)
                }

                // ── Create Three.js mesh for each geometry part ──
                for (let j = 0; j < placed.geometries.size(); j++) {
                    try {
                        const part = placed.geometries.get(j);

                        // Get raw vertex + index data from web-ifc
                        const geo = ifc.GetGeometry(modelID, part.geometryExpressID);
                        const verts = ifc.GetVertexArray(
                            geo.GetVertexData(),
                            geo.GetVertexDataSize()
                        );
                        const inds = ifc.GetIndexArray(
                            geo.GetIndexData(),
                            geo.GetIndexDataSize()
                        );

                        // web-ifc vertex format: x,y,z, nx,ny,nz (6 floats per vertex)
                        // We only want positions (first 3 of every 6)
                        const positions = [];
                        for (let k = 0; k < verts.length; k += 6) {
                            positions.push(verts[k], verts[k + 1], verts[k + 2]);
                        }

                        // Build Three.js BufferGeometry
                        const geometry = new THREE.BufferGeometry();
                        geometry.setAttribute(
                            'position',
                            new THREE.Float32BufferAttribute(positions, 3)
                        );
                        geometry.setIndex(Array.from(inds));
                        geometry.computeVertexNormals(); // needed for lighting

                        // MeshStandardMaterial gives realistic PBR shading
                        const material = new THREE.MeshStandardMaterial({
                            color: meshColor,
                            roughness: 0.65,
                            metalness: meshColor === COLOR.BRACE ? 0.3 : 0.6,
                            side: THREE.DoubleSide,
                        });

                        const mesh = new THREE.Mesh(geometry, material);

                        // Apply the 4×4 placement matrix so the mesh sits in
                        // the correct world position/rotation from the IFC file
                        if (
                            part.flatTransformation &&
                            part.flatTransformation.length === 16
                        ) {
                            const m = new THREE.Matrix4();
                            m.fromArray(part.flatTransformation);
                            mesh.applyMatrix4(m);
                        }

                        // Store original colour so hover can restore it
                        mesh.userData.originalColor = meshColor;
                        mesh.userData.elemName = elemName;
                        mesh.userData.elemType = elemType;

                        group.add(mesh);
                    } catch (_) { }
                }

                if (i % 50 === 0) {
                    setStatus(
                        `Building geometry… ${Math.round((i / allGeometry.size()) * 100)}%`
                    );
                }
            }

            // ── Centre the group and fit camera ──────────────
            const box = new THREE.Box3().setFromObject(group);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            // Centre group at world origin for easier navigation
            group.position.sub(center);
            group.position.y += 2;      // slight lift above the grid
            scene.add(group);

            const maxDim = Math.max(size.x, size.y, size.z);
        
            camera.position.set(maxDim, maxDim * 0.6, maxDim);
            controls.target.set(0, 0, 0);
            controls.minDistance = 5;
            controls.maxDistance = maxDim * 8;
            controls.update();

            // ── Apply concrete colour to top-zone beams ───────
            //  After centering, beams whose world Y centre is above
            //  (size.y * 0.35) are considered the upper deck zone
            //  and get a concrete-beige tint.
            const concreteThreshold = (size.y * 0.35) - center.y;
            group.traverse((obj) => {
                if (!obj.isMesh) return;
                if (obj.userData.elemType === WebIFC.IFCBUILDINGELEMENTPROXY) return;
                // Get approximate world Y centre of this mesh
                const mBox = new THREE.Box3().setFromObject(obj);
                const mCenter = mBox.getCenter(new THREE.Vector3());
                if (mCenter.y > concreteThreshold) {
                    // This beam is in the upper zone — concrete colour
                    obj.material = obj.material.clone();
                    obj.material.color.set(COLOR.CONCRETE);
                    obj.userData.originalColor = COLOR.CONCRETE;
                }
            });

            // ── Fill stats with real measurements ────────────
            stats.spanLength = size.x.toFixed(1) + ' m';
            stats.bridgeWidth = size.z.toFixed(1) + ' m';
            stats.bridgeHeight = size.y.toFixed(2) + ' m';
            stats.minCoord =
                `(${box.min.x.toFixed(1)}, ${box.min.y.toFixed(1)}, ${box.min.z.toFixed(1)})`;
            stats.maxCoord =
                `(${box.max.x.toFixed(1)}, ${box.max.y.toFixed(1)}, ${box.max.z.toFixed(1)})`;
            stats.material = 'Structural Steel';

            // ── Render info panel ────────────────────────────
            renderPanel(stats);

            setStatus('✓ Bridge loaded — drag to rotate');
            setTimeout(() => {
                document.getElementById('status-bar').style.opacity = '0';
            }, 3000);
        }


        // ════════════════════════════════════════════════════
        //  INFO PANEL
        // ════════════════════════════════════════════════════

        function renderPanel(s) {
            document.getElementById('panel-body').innerHTML = `

        <!-- PROJECT INFO -->
        <div class="section">
          <div class="section-title">Project</div>
          <div class="info-row">
            <span class="info-label">Name</span>
            <span class="info-value">${s.projectName}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Type</span>
            <span class="info-value">Steel Composite Girder</span>
          </div>
          <div class="info-row">
            <span class="info-label">Standard</span>
            <span class="info-value">IS 1343 / IRC</span>
          </div>
          <div class="info-row">
            <span class="info-label">Material</span>
            <span class="info-value">${s.material}</span>
          </div>
        </div>

        <!-- DIMENSIONS -->
        <div class="section">
          <div class="section-title">Dimensions (from IFC geometry)</div>
          <div class="info-row">
            <span class="info-label">Span Length</span>
            <span class="info-value">${s.spanLength}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Bridge Width</span>
            <span class="info-value">${s.bridgeWidth}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Girder Depth</span>
            <span class="info-value">${s.bridgeHeight}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Lanes</span>
            <span class="info-value">3</span>
          </div>
          <div class="info-row">
            <span class="info-label">Footpath</span>
            <span class="info-value">None</span>
          </div>
        </div>

        <!-- COORDINATES -->
        <div class="section">
          <div class="section-title">Bounding Box Coordinates</div>
          <div class="info-row">
            <span class="info-label">Start (min)</span>
            <span class="info-value">${s.minCoord}</span>
          </div>
          <div class="info-row">
            <span class="info-label">End (max)</span>
            <span class="info-value">${s.maxCoord}</span>
          </div>
        </div>

        <!-- ELEMENT COUNT -->
        <div class="section">
          <div class="section-title">IFC Elements</div>
          <div class="info-row">
            <span class="info-label">Steel Beams</span>
            <span class="info-value">${s.totalBeams} (IFCBEAM)</span>
          </div>
          <div class="info-row">
            <span class="info-label">Cross Bracings</span>
            <span class="info-value">${s.totalBraces} (Brace)</span>
          </div>
          <div class="info-row">
            <span class="info-label">Total Elements</span>
            <span class="info-value">${s.totalBeams + s.totalBraces}</span>
          </div>
        </div>

        <!-- COLOUR LEGEND -->
        <div class="section">
          <div class="section-title">Colour Legend</div>
          <div class="legend-row">
            <div class="legend-dot" style="background:#D4C5A9;"></div>
            <span class="legend-label">Upper deck zone (concrete tint)</span>
          </div>
          <div class="legend-row">
            <div class="legend-dot" style="background:#607D8B;"></div>
            <span class="legend-label">Main steel girders (IFCBEAM)</span>
          </div>
          <div class="legend-row">
            <div class="legend-dot" style="background:#CFD8DC;"></div>
            <span class="legend-label">Cross bracings (light)</span>
          </div>
          <div class="legend-row">
            <div class="legend-dot" style="background:#90AF13; border-radius:50%;"></div>
            <span class="legend-label">Hovered element</span>
          </div>
        </div>

        <!-- CONTROLS HELP -->
        <div class="section">
          <div class="section-title">Controls</div>
          <div class="info-row">
            <span class="info-label">Rotate</span>
            <span class="info-value">Left drag</span>
          </div>
          <div class="info-row">
            <span class="info-label">Pan</span>
            <span class="info-value">Right drag</span>
          </div>
          <div class="info-row">
            <span class="info-label">Zoom</span>
            <span class="info-value">Scroll wheel</span>
          </div>
          <div class="info-row">
            <span class="info-label">Hover</span>
            <span class="info-value">See element name</span>
          </div>
        </div>

      `;
        }


        // ════════════════════════════════════════════════════
        //  HOVER HIGHLIGHTING + TOOLTIP
        // ════════════════════════════════════════════════════

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');
        let highlighted = null;

        window.addEventListener('mousemove', (e) => {
            // Ignore if mouse is over the panel
            if (e.clientX > window.innerWidth - 280) {
                if (highlighted) {
                    highlighted.material.color.set(highlighted.userData.originalColor);
                    highlighted = null;
                }
                tooltip.style.display = 'none';
                return;
            }

            // Convert mouse position to NDC (-1 to +1)
            mouse.x = (e.clientX / (window.innerWidth - 280)) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const meshes = [];
            group.traverse((obj) => { if (obj.isMesh) meshes.push(obj); });

            const hits = raycaster.intersectObjects(meshes, false);

            // Restore previous highlight
            if (highlighted) {
                highlighted.material.color.set(highlighted.userData.originalColor);
                highlighted = null;
            }

            if (hits.length > 0) {
                highlighted = hits[0].object;
                // Clone material so we don't change all meshes sharing it
                highlighted.material = highlighted.material.clone();
                highlighted.material.color.set(0x90AF13); // Osdag green highlight
                document.body.style.cursor = 'pointer';

                // Show tooltip
                const name = highlighted.userData.elemName || 'Element';
                const type = highlighted.userData.elemType === WebIFC.IFCBEAM
                    ? 'IFCBEAM'
                    : 'IFCBUILDINGELEMENTPROXY';
                tooltip.innerHTML = `<b>${name}</b><br>Type: ${type}`;
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 14) + 'px';
                tooltip.style.top = (e.clientY - 10) + 'px';
            } else {
                document.body.style.cursor = 'default';
                tooltip.style.display = 'none';
            }
        });


        // ════════════════════════════════════════════════════
        //  ANIMATION LOOP
        // ════════════════════════════════════════════════════

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();


        // ════════════════════════════════════════════════════
        //  RESIZE HANDLER
        // ════════════════════════════════════════════════════

        window.addEventListener('resize', () => {
            const w = window.innerWidth - 280;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });


        // ── START LOADING ────────────────────────────────────
        loadIFC().catch((err) => {
            console.error(err);
            setStatus('✗ Error — check console (F12)');
        });

    </script>
</body>

</html>
